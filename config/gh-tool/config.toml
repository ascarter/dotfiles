# gh-tool manifest — CLI tools from GitHub releases
#
# Managed by: dotfiles sync → ~/.config/gh-tool/config.toml
# Install all:  gh tool install
# Upgrade all:  gh tool upgrade
# List status:  gh tool list

# ── Rust-triple tools ────────────────────────────────────────────

[[tool]]
repo = "BurntSushi/ripgrep"
pattern = "ripgrep-*-aarch64-apple-darwin.tar.gz"
bin = ["rg"]
man = ["doc/rg.1"]
completions = ["complete/_rg", "complete/rg.bash"]

[[tool]]
repo = "casey/just"
pattern = "just-*-aarch64-apple-darwin.tar.gz"
bin = ["just"]
man = ["just.1"]
completions = ["completions/just.zsh", "completions/just.bash"]

[[tool]]
repo = "ClementTsang/bottom"
pattern = "bottom_aarch64-apple-darwin.tar.gz"
bin = ["btm"]
completions = ["completion/_btm", "completion/btm.bash"]

[[tool]]
repo = "lusingander/serie"
pattern = "serie-*-aarch64-apple-darwin.tar.gz"
bin = ["serie"]

[[tool]]
repo = "sharkdp/fd"
pattern = "fd-*-aarch64-apple-darwin.tar.gz"
bin = ["fd"]
man = ["fd.1"]
completions = ["autocomplete/_fd", "autocomplete/fd.bash"]

[[tool]]
repo = "spinel-coop/rv"
pattern = "rv-aarch64-apple-darwin.tar.xz"
bin = ["rv", "rvx"]

[[tool]]
repo = "astral-sh/uv"
pattern = "uv-aarch64-apple-darwin.tar.gz"
bin = ["uv", "uvx"]

# ── Go-style naming (cross-platform with {{os}}/{{arch}}) ───────

[[tool]]
repo = "direnv/direnv"
pattern = "direnv.{{os}}-{{arch}}"
bin = ["direnv"]

[[tool]]
repo = "junegunn/fzf"
pattern = "fzf-*-{{os}}_{{arch}}.tar.gz"
bin = ["fzf"]

[[tool]]
repo = "mikefarah/yq"
pattern = "yq_{{os}}_{{arch}}.tar.gz"
bin = ["yq"]
man = ["yq.1"]

# ── Unique naming patterns ──────────────────────────────────────

[[tool]]
repo = "jqlang/jq"
pattern = "jq-macos-arm64"
tag = "jq-1.8.1"
bin = ["jq"]

[[tool]]
repo = "koalaman/shellcheck"
pattern = "shellcheck-*.darwin.aarch64.tar.gz"
bin = ["shellcheck"]

[[tool]]
repo = "neovim/neovim"
pattern = "nvim-macos-arm64.tar.gz"
bin = ["nvim"]
man = ["share/man/man1/nvim.1"]

[[tool]]
repo = "Schniz/fnm"
pattern = "fnm-macos.zip"
bin = ["fnm"]

[[tool]]
repo = "tree-sitter/tree-sitter"
pattern = "tree-sitter-cli-macos-arm64.zip"
bin = ["tree-sitter"]
